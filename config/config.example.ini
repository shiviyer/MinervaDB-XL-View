; =============================================================================
; config.example.ini
; Example Configuration File for Excel-PostgreSQL-Dashboard
; Author: Shiv Iyer | MinervaDB | ChistaDATA
; License: MIT
;
; USAGE:
;   1. Copy this file to config/config.ini
;   2. Fill in your PostgreSQL connection details
;   3. NEVER commit config.ini to version control (it's in .gitignore)
;   4. Use environment variables in production instead
;
; ENVIRONMENT VARIABLE ALTERNATIVE:
;   Set these env vars instead of using this file:
;   PG_HOST, PG_PORT, PG_DATABASE, PG_USERNAME, PG_PASSWORD
;   PG_SCHEMA, PG_SSLMODE, PG_CONNECT_TIMEOUT
; =============================================================================

; -----------------------------------------------------------------------------
[postgresql]
; PostgreSQL server hostname or IP address
; Examples: localhost, 192.168.1.100, db.example.com, mydb.rds.amazonaws.com
host = localhost

; PostgreSQL port (default: 5432)
port = 5432

; Target database name
database = your_database_name

; Database username (use a read-only role for dashboards)
; Recommended: Create dedicated 'excel_dashboard_ro' role
; See: sql/setup/create_sample_schema.sql for role creation
username = excel_dashboard_ro

; Database password
; WARNING: Keep this file out of version control!
; Consider using environment variables or OS keychain instead
password = your_secure_password_here

; Default schema to search
; Use comma-separated for multiple schemas: public,sales,finance
schema = public

; SSL mode for secure connections
; Options: disable, allow, prefer, require, verify-ca, verify-full
; Recommended for production: require
sslmode = prefer

; Connection timeout in seconds
connect_timeout = 30

; Application name (visible in pg_stat_activity)
application_name = Excel-PostgreSQL-Dashboard

; -----------------------------------------------------------------------------
[connection_pool]
; Minimum number of connections in the pool
pool_min = 1

; Maximum number of connections in the pool
; Keep low for Excel usage (typically 1-5 concurrent connections)
pool_max = 5

; -----------------------------------------------------------------------------
[refresh]
; Automated refresh settings

; Enable scheduled refresh (true/false)
enabled = false

; Refresh interval in minutes (used by Python scheduler)
interval_minutes = 60

; Refresh time for daily batch (24h format: HH:MM)
daily_refresh_time = 06:00

; Maximum query execution time in seconds before timeout
query_timeout_seconds = 120

; -----------------------------------------------------------------------------
[logging]
; Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO

; Log file path (leave empty to log to console only)
; log_file = logs/dashboard.log

; Maximum log file size in MB before rotation
; max_log_size_mb = 10

; Number of backup log files to keep
; backup_count = 5

; -----------------------------------------------------------------------------
[excel]
; Excel workbook settings

; Default output directory for exported files
; output_dir = C:\Users\YourName\Documents\Dashboards

; Date format for Excel cells
date_format = YYYY-MM-DD

; Number format for currency values
currency_format = $#,##0.00

; Number format for percentages
percent_format = 0.00%

; Header row color (RGB hex, without #)
header_color = 1F497D

; Alternate row color (RGB hex, without #)
alt_row_color = DCE6F1

; -----------------------------------------------------------------------------
[security]
; Credential security settings

; Encryption method for stored passwords
; Options: none, fernet (AES-256), keyring (OS keychain)
encryption_method = keyring

; Key file path for Fernet encryption (only used when encryption_method=fernet)
; key_file = config/.encryption_key

; -----------------------------------------------------------------------------
; EXAMPLE ODBC DSN (alternative connection method)
; See config/dsn_setup_guide.md for ODBC setup instructions
; [odbc]
; dsn_name = PostgreSQL_Dashboard
; username = excel_dashboard_ro
